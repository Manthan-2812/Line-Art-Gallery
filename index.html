<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line and Layer Gallery</title>
    <meta name="description" content="Line and Layer Gallery — an interactive art portfolio with dynamic animations">
    <meta name="keywords"    content="art, portfolio, gallery, line and layer, digital art">

    <!-- React 18 -->
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (transpiles JSX in-browser) -->
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion — accessed via window.Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style type="text/tailwindcss">
    @layer base {
        /* Background is handled by the canvas in app.js — keep body transparent */
        html, body {
            background-color: #080e1d;
            color: white;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        /* Smooth scrolling for anchor links */
        html { scroll-behavior: smooth; }
        /* Hide scrollbar on WebKit while keeping scroll functionality */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
    }

    @layer utilities {
        /* Tailwind doesn't generate border-white/8 by default in CDN mode — add manually */
        .border-white\/8  { border-color: rgba(255,255,255,0.08); }
        .border-white\/10 { border-color: rgba(255,255,255,0.10); }
        .border-white\/15 { border-color: rgba(255,255,255,0.15); }
    }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Load utilities first so functions are available to components -->
    <script type="text/babel" src="utils/auth.js"></script>
    <script type="text/babel" src="components/Navbar.js"></script>
    <script type="text/babel" src="components/TransitionOverlay.js"></script>
    <!-- Hero draggable cards + About Me pixelated portrait -->
    <script type="text/babel" src="components/DraggableCards.js"></script>
    <script type="text/babel" src="components/PixelatedCanvas.js"></script>
    <!-- Main landing page app -->
    <script type="text/babel" src="app.js"></script>
</body>
</html>
